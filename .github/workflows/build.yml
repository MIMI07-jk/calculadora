name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Android Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool m4 \
            pkg-config \
            zlib1g-dev libncurses5-dev libgdbm-dev \
            libssl-dev libffi-dev libsqlite3-dev \
            tk-dev libgdbm-compat-dev \
            libreadline-dev liblzma-dev \
            cmake ninja-build
          
          # Rebuild libtool macros
          sudo libtoolize --force --copy --quiet || true

      - name: Install Buildozer and Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython virtualenv pycparser

      - name: Create Buildozer Config Cache Directory
        run: mkdir -p ~/.buildozer

      - name: Build APK
        run: |
          # Limpiar variables heredadas del sistema que chocan con Buildozer
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK_ROOT
          unset ANDROID_NDK
          
          # Compilar la aplicación
          buildozer android debug 2>&1 | tee build.log
        continue-on-error: false

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: calculadora-apk
          path: "**/*.apk"

      - name: Upload Build Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
